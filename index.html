<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TP2 Dualde Paint</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
        <button id="btn-limpiar">Limpiar Lienzo</button>
        <button id="btn-guardar">Guardar Imagen</button>
        <input type="file" id="cargaImagen">
    </header>

    <main>
        <aside class="sidebar">

            <!-- Herramientas de dibujo -->
            <div class="tool-section">
                <span class="tool-section-label">Herramientas</span>
                <button id="btn-lapiz">Lápiz</button>
                <label>Grosor</label>
                <input id="grosor-lapiz" type="range" min="1" max="50" value="5">
                <button id="btn-goma">Goma</button>
                <label>Grosor</label>
                <input id="grosor-goma" type="range" min="1" max="50" value="10">
                <label>Color</label>
                <input id="nroColor" type="color">
            </div>

            <!-- Filtros simples -->
            <div class="tool-section">
                <span class="tool-section-label">Filtros simples</span>
                <button id="btn-imageIni">Imagen inicial</button>
                <button id="btn-escalaGrises">Escala de grises</button>
                <button id="btn-negativo">Negativo</button>
                <button id="btn-sepia">Sepia</button>
                <button id="btn-binarizacion">Binarización</button>
                <button id="btn-posterizacion">Posterización</button>
                <label>Brillo</label>
                <input id="brillo-slider" type="range" min="0" max="100" value="50">
            </div>

            <!-- Filtros avanzados -->
            <div class="tool-section">
                <span class="tool-section-label">Filtros avanzados</span>
                <button id="btn-saturacion">Saturación</button>
                <button id="btn-bordes">Detección de bordes</button>
                <button id="btn-blur">Blur</button>
            </div>

        </aside>

        <div class="canvas-container">
            <canvas id="lienzo" width="800" height="600"></canvas>
        </div>
    </main>

    <script src="js/filtroSimple.js"></script>
    <script src="js/filtroAvanzado.js"></script>
    <script src="js/image.js"></script>
    <script src="js/pen.js"></script>
    <script src="js/paint.js"></script>

</body>

</html>
